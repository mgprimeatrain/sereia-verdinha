<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Estoque</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">
</head>
<body>
    <div class="painel-container">
    <div class="painel-topo">
        <h1>Painel de estoque</h1>
        <a href="{{ url_for('admin_adicionar') }}" class="btn-adicionar-produto">Adicionar nova planta</a>
        <a href="{{ url_for('admin_logout') }}" class="btn-sair">Sair</a>
    </div>

    <!-- 👇 FORM ÚNICO -->
    <form method="POST">

        <div class="lista-produtos">
            {% for planta in plantas %}
            <div class="produto-card">
                <div class="produto-info">
                    <h2>{{ planta.nome }}</h2>
                    <p>{{ planta.descricao }}</p>
                    <span class="estoque-atual">
                        Estoque atual: <strong>{{ planta.estoque }}</strong>
                    </span>
                </div>

                <div class="form-estoque">
                    <input type="number"
                           name="estoque_{{ planta.id }}"
                           value="{{ planta.estoque }}"
                           min="0"
                           required>
                </div>
            </div>
            {% endfor %}
        </div>

        <!-- 👇 BOTÃO GLOBAL -->
        <button type="submit" class="btn-salvar-todos">
            Salvar todos
        </button>

    </form>
</div>

  

</body>
</html>
