<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adicionar planta</title>
</head>
<body>
    <h1>Adicionar planta</h1>

    <form method="POST" enctype="multipart/form-data">

    <input type="text" name="nome" placeholder="Nome da planta" required><br><br>

    <input type="text" name="preco" placeholder="Preço (ex: 79,90)" required><br><br>

    <!-- 🔴 SÓ AQUI é file -->
    <input type="file" name="image" required><br><br>

    <textarea name="descricao" placeholder="Descrição" required></textarea><br><br>

    <input type="number" name="estoque" placeholder="Estoque" required><br><br>

    <input type="text" name="luz" placeholder="Luz (ex: meia sombra)" required><br><br>

    <input type="text" name="rega" placeholder="Rega (ex: 2x por semana)" required><br><br>

    <input type="text" name="ambiente" placeholder="Ambiente (interno/externo)" required><br><br>

    <input type="text" name="dificuldade" placeholder="Dificuldade (fácil/médio/difícil)" required><br><br>

    <button type="submit">Salvar planta</button>

</form>

        <button type="submit">Salvar planta</button>

  
    </form>
</body>
</html>
